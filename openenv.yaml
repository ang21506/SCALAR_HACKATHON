spec_version: 1
name: smart-irrigation-env
type: space
runtime: fastapi
app: server.app:app
port: 7860
description: "A realistic agricultural reinforcement learning environment for smart irrigation, subject to water quotas, energy tariffs, and weather uncertainty."
entrypoint: env.py:SmartIrrigationEnv
schemas:
  observation: schemas.py:Observation
  action: schemas.py:Action
  reward: schemas.py:Reward
  state: schemas.py:State
tasks:
  - id: task1_easy
    description: "Single crop, identical soil across 2 plots, simple tariff schedule, relatively accurate weather forecast."
    grader: openenv/grade
  - id: task2_medium
    description: "Mixed crops spread across 4 plots, tighter water quotas, and pronounced peak/off-peak tariff differences."
    grader: openenv/grade
  - id: task3_hard
    description: "5 diverse plots, highly uncertain rainfall, strict water limits, and complex tariffs."
    grader: openenv/grade
